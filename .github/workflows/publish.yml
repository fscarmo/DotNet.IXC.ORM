name: Publish to NuGet

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build --configuration Release

      - name: Run Tests
        run: |
          dotnet test ./DotNet.IXC.ORM.Test/DotNet.IXC.ORM.Test.csproj --configuration Release
          --no-build --verbosity normal
        env:
          IxcOrm__AccessToken: "0:1234567891012345678910123456789101234567891012345678910123456789"
          IxcOrm__ServerDomain: "www.dominio.com.br"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: NuGetRelease
    steps:
      - uses: actions/checkout@v4
      
      - name: Pack
        run: dotnet pack --configuration Release --output ./nupkg
        
      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://nuget.org --skip-duplicate
